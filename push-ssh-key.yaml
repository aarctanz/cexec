steps:
  - name: "push master ssh key to hpc user"
    sudo: false
    command: >-
      mkdir -p ~/.ssh &&
      chmod 700 ~/.ssh &&
      grep -qxF '{{master_pubkey}}' ~/.ssh/authorized_keys 2>/dev/null ||
      echo '{{master_pubkey}}' >> ~/.ssh/authorized_keys &&
      chmod 600 ~/.ssh/authorized_keys
