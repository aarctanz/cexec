# inventory.yaml — group metadata and fallback IP source for cexec
#
# When CLUSTER_HOSTS_FILE=/etc/hosts is set (default):
#   - IPs come from /etc/hosts (authoritative)
#   - Groups, port, and user come from this file (overlay)
#   - New nodes found in /etc/hosts are auto-appended here with default groups
#   - Nodes here but absent from /etc/hosts produce a warning
#
# When CLUSTER_HOSTS_FILE is unset or --use-inventory is passed:
#   - This file is the sole source of truth for IPs and groups
#
# Groups: master must be [control]; all compute nodes must be [compute].
# You only need to change groups if a node has a non-default role.
nodes:
  - name: master
    host: 172.16.12.90
    user: hpc
    port: 22
    groups: [control]

  - name: node1
    host: 172.16.12.162
    user: hpc
    port: 22
    groups: [compute]

